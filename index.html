<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>auto-contrast 데모</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, 'Pretendard', sans-serif;
      }
      .input-bar {
        width: 100%;
        padding: 16px;
        font-size: 40px;
        font-weight: 700;

        border: none;
        border-bottom: 2px solid #ddd;
        outline: none;
        text-align: center;
      }
      .input-bar:focus {
        border-bottom-color: #333;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(1, 1fr);
      }
      .cell {
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10vw;
        font-weight: 700;
        overflow: hidden;
      }
      @media (min-width: 480px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 768px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (min-width: 1440px) {
        .grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      @media (min-width: 1920px) {
        .grid {
          grid-template-columns: repeat(6, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <input class="input-bar" type="text" value="" placeholder="텍스트 입력" />
    <div class="grid">
      <div class="cell" style="background: #000000">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #1a1a2e">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #16213e">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #0f3460">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #533483">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #e94560">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #ff6600">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #ffcc00">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #f9fafb">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #ffffff">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #10b981">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #059669">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #003366">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #3b82f6">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #8b5cf6">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #ec4899">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #ef4444">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #f97316">

      </div>
      <div class="cell" style="background: #374151">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #14b8a6">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #a855f7">
        <span class="auto-contrast">충</span>
      </div>
      <div class="cell" style="background: #facc15">
        <span class="auto-contrast">충</span>
      </div>
    </div>
    <script src="auto-contrast.js"></script>
    <script>
      var input = document.querySelector('.input-bar')
      var spans = document.querySelectorAll('.cell .auto-contrast')
      function show(text) {
        var ch = text || '충'
        for (var i = 0; i < spans.length; i++) {
          spans[i].textContent = ch
        }
      }
      input.addEventListener('compositionstart', function () {
        if (input.value.length >= 1) {
          input.value = ''
        }
      })
      input.addEventListener('input', function () {
        show(input.value.slice(-1))
      })
      input.addEventListener('compositionend', function () {
        input.value = input.value.slice(-1)
        show(input.value)
      })
    </script>
  </body>
</html>
